<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#2f6df6" />
<title>whova-three · Event App Prototype</title>
<link rel="stylesheet" href="styles.css" />
<style>
  #toast {
    position: absolute; left: 50%; bottom: 84px; transform: translate(-50%, 10px);
    background: #16202e; color: #fff; padding: 10px 16px; border-radius: 12px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .2s, transform .2s;
    z-index: 60; max-width: 84%; text-align: center; pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.3);
  }
</style>
</head>
<body>
  <div class="device">
    <div class="screen-wrap" id="scrollArea"></div>
    <div id="footer"></div>
    <nav class="tabbar" id="tabbar"></nav>

    <!-- bottom sheet / modal -->
    <div class="scrim" id="scrim"><div class="sheet"></div></div>
    <div id="toast"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
